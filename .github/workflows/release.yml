name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .app bundle
        run: ./Scripts/build-app.sh

      - name: Create DMG
        run: ./Scripts/make-dmg.sh

      - name: Zip .app bundle
        run: ditto -c -k --sequesterRsrc --keepParent WorkdayBar.app WorkdayBar.zip

      - name: Rename artifacts with version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv WorkdayBar.dmg "WorkdayBar-${VERSION}.dmg"
          mv WorkdayBar.zip "WorkdayBar-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            WorkdayBar-*.dmg
            WorkdayBar-*.zip
